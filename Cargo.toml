[workspace]
members = [
    "crates/rollout-core",
    "crates/rollout-cli",
    "xtask",
]
resolver = "2"

[workspace.package]
version = "0.1.0"
edition = "2021"
license = "MIT"
rust-version = "1.88.0"
repository = "https://github.com/astiwari/rollout"

[workspace.lints.rust]
missing_docs = "warn"
unsafe_code = "forbid"

[workspace.lints.clippy]
all = { level = "warn", priority = -1 }
pedantic = { level = "warn", priority = -1 }
missing_errors_doc = "allow"
module_name_repetitions = "allow"

[workspace.dependencies]
serde = { version = "1", features = ["derive"] }
serde_json = "1"
schemars = "1.2.1"
thiserror = "2.0.18"
async-trait = "0.1.89"
tracing = "0.1"
ulid = { version = "1.2.1", features = ["serde"] }
blake3 = "1.8.5"
clap = { version = "4", features = ["derive"] }
cargo_metadata = "0.18"

# Phase 2 — types used by `rollout-core`'s trait surface extensions (Wave-0).
smol_str = { version = "=0.3.2", features = ["serde"] }
tokio    = { version = "1.40", features = ["sync"] }
