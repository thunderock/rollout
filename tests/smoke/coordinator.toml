# Phase-2 smoke coordinator fixture. CONTEXT D-TIME-01 defaults are inherited
# from TransportConfig::default() via serde(default), so this file only sets
# the run_id and overrides per-fixture storage / tls paths.
run_id = "01JFEAVS7C5DE5XEAEAB91EBT5"

[storage]
path = "./data/smoke/coord.db"

