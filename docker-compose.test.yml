# Phase 5 — emulator setup for the cloud-emulator-{aws,gcp} CI jobs and local dev.
# Versions pinned per Claude's Discretion (05-CONTEXT.md): localstack 3.7.0.
services:
  localstack:
    image: localstack/localstack:3.7.0
    environment:
      SERVICES: s3,sqs,secretsmanager
      DEBUG: 0
      PERSISTENCE: 0
      # FAILURE_INJECTION intentionally OFF here; the throttle fixture witnesses
      # the error-mapping contract directly rather than relying on emulator chaos.
    ports:
      - "4566:4566"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:4566/_localstack/health"]
      interval: 2s
      timeout: 1s
      retries: 30
    restart: "no"

  fake-gcs-server:
    image: fsouza/fake-gcs-server:1.50.2
    command: ["-scheme", "http", "-port", "4443", "-public-host", "fake-gcs-server:4443"]
    ports:
      - "4443:4443"
    healthcheck:
      test: ["CMD", "wget", "-q", "-O-", "http://localhost:4443/storage/v1/b"]
      interval: 2s
      timeout: 1s
      retries: 30
    restart: "no"

  pubsub-emulator:
    image: gcr.io/google.com/cloudsdktool/google-cloud-cli:emulators
    command: ["gcloud", "beta", "emulators", "pubsub", "start", "--host-port=0.0.0.0:8085", "--project=rollout-test"]
    ports:
      - "8085:8085"
    restart: "no"

  # NOTE: No first-party GCP Secret Manager emulator exists.
  # rollout-cloud-gcp Secret Manager tests use an in-test hyper mock
  # (crates/rollout-cloud-gcp/tests/support/mock_secret_manager.rs), so no Docker
  # service is needed for SecretStore tests.
