<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 640" width="1280" height="640">
  <!-- Thumbnail 08 refreshed with the new tri-color palette and gradient wordmark. -->
  <defs>
    <linearGradient id="bg8v2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0F172A"/>
      <stop offset="1" stop-color="#020617"/>
    </linearGradient>
    <linearGradient id="cardOrange" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FB923C"/>
      <stop offset="1" stop-color="#EA580C"/>
    </linearGradient>
    <linearGradient id="cardMagenta" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#F472B6"/>
      <stop offset="1" stop-color="#BE185D"/>
    </linearGradient>
    <linearGradient id="cardPurple" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#A78BFA"/>
      <stop offset="1" stop-color="#5B21B6"/>
    </linearGradient>
    <linearGradient id="wordmarkGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#F97316"/>
      <stop offset="0.5" stop-color="#DB2777"/>
      <stop offset="1" stop-color="#7C3AED"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="22" flood-color="#000" flood-opacity="0.55"/>
    </filter>
  </defs>

  <rect width="1280" height="640" fill="url(#bg8v2)"/>

  <!-- 3 layered cards (algorithms on top, substrate, cloud) -->
  <g filter="url(#softShadow)">
    <!-- back card (purple — cloud/storage) -->
    <g transform="translate(160 200) rotate(-2)">
      <rect width="520" height="260" rx="18" fill="url(#cardPurple)"/>
      <rect width="520" height="260" rx="18" fill="none" stroke="#FFFFFF" stroke-opacity="0.18" stroke-width="1"/>
      <text x="32" y="50" font-family="'SF Mono', 'JetBrains Mono', Menlo, monospace"
            font-size="13" fill="#FFFFFF" fill-opacity="0.85" letter-spacing="3">CLOUD / STORAGE</text>
      <text x="32" y="100" font-family="'SF Pro Display', Helvetica, sans-serif"
            font-size="26" fill="#FFFFFF">embedded · postgres · S3 · GCS</text>
      <line x1="32" y1="130" x2="488" y2="130" stroke="#FFFFFF" stroke-opacity="0.2"/>
      <text x="32" y="170" font-family="'SF Mono', 'JetBrains Mono', Menlo, monospace"
            font-size="14" fill="#FFFFFF" fill-opacity="0.8">rollout-storage · rollout-cloud-aws</text>
      <text x="32" y="200" font-family="'SF Mono', 'JetBrains Mono', Menlo, monospace"
            font-size="14" fill="#FFFFFF" fill-opacity="0.8">rollout-cloud-gcp · rollout-cloud-local</text>
    </g>

    <!-- middle card (magenta — substrate) -->
    <g transform="translate(220 170)">
      <rect width="520" height="260" rx="18" fill="url(#cardMagenta)"/>
      <rect width="520" height="260" rx="18" fill="none" stroke="#FFFFFF" stroke-opacity="0.2" stroke-width="1"/>
      <text x="32" y="50" font-family="'SF Mono', 'JetBrains Mono', Menlo, monospace"
            font-size="13" fill="#FFFFFF" fill-opacity="0.92" letter-spacing="3">DISTRIBUTED SUBSTRATE</text>
      <text x="32" y="100" font-family="'SF Pro Display', Helvetica, sans-serif"
            font-size="26" fill="#FFFFFF">coord · workers · plugins</text>
      <line x1="32" y1="130" x2="488" y2="130" stroke="#FFFFFF" stroke-opacity="0.22"/>
      <text x="32" y="170" font-family="'SF Mono', 'JetBrains Mono', Menlo, monospace"
            font-size="14" fill="#FFFFFF" fill-opacity="0.86">async-native · gRPC · sled/redb</text>
      <text x="32" y="200" font-family="'SF Mono', 'JetBrains Mono', Menlo, monospace"
            font-size="14" fill="#FFFFFF" fill-opacity="0.86">PyO3 + sidecar plugin host</text>
    </g>

    <!-- front card (orange — algorithms) -->
    <g transform="translate(280 140) rotate(2)">
      <rect width="520" height="260" rx="18" fill="url(#cardOrange)"/>
      <rect width="520" height="260" rx="18" fill="none" stroke="#FFFFFF" stroke-opacity="0.25" stroke-width="1"/>
      <text x="32" y="50" font-family="'SF Mono', 'JetBrains Mono', Menlo, monospace"
            font-size="13" fill="#FFFFFF" letter-spacing="3">ALGORITHMS / RUNTIMES</text>
      <text x="32" y="100" font-family="'SF Pro Display', Helvetica, sans-serif"
            font-size="26" fill="#FFFFFF">SFT · RM · PPO · GRPO · DPO</text>
      <line x1="32" y1="130" x2="488" y2="130" stroke="#FFFFFF" stroke-opacity="0.3"/>
      <text x="32" y="170" font-family="'SF Mono', 'JetBrains Mono', Menlo, monospace"
            font-size="14" fill="#FFFFFF" fill-opacity="0.9">vLLM backend · batch + online infer</text>
      <text x="32" y="200" font-family="'SF Mono', 'JetBrains Mono', Menlo, monospace"
            font-size="14" fill="#FFFFFF" fill-opacity="0.9">snapshots · CRIU · episodic</text>
    </g>
  </g>

  <!-- right side wordmark with gradient -->
  <text x="910" y="270" font-family="'SF Pro Display', 'Helvetica Neue', Helvetica, Arial, sans-serif"
        font-size="100" font-weight="800" fill="url(#wordmarkGrad)" letter-spacing="-4">rollout</text>
  <text x="910" y="320" font-family="'SF Mono', 'JetBrains Mono', Menlo, monospace"
        font-size="20" fill="#E2E8F0" letter-spacing="1">layered LLM-RL</text>
  <text x="910" y="354" font-family="'SF Mono', 'JetBrains Mono', Menlo, monospace"
        font-size="16" fill="#94A3B8">Rust core · Python plugins</text>
  <text x="910" y="380" font-family="'SF Mono', 'JetBrains Mono', Menlo, monospace"
        font-size="16" fill="#94A3B8">MIT · v1.0</text>

  <text x="910" y="595" font-family="'SF Mono', 'JetBrains Mono', Menlo, monospace"
        font-size="14" fill="#64748B">github.com/thunderock/rollout</text>
</svg>
