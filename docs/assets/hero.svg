<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 900" width="1440" height="900">
  <!-- Website / docs hero mock — light theme, PyG-inspired layout. -->
  <defs>
    <linearGradient id="wmHero" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#F97316"/>
      <stop offset="0.5" stop-color="#DB2777"/>
      <stop offset="1" stop-color="#5B21B6"/>
    </linearGradient>
    <linearGradient id="cardOrangeL" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FB923C"/>
      <stop offset="1" stop-color="#F97316"/>
    </linearGradient>
    <linearGradient id="cardMagentaL" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#F472B6"/>
      <stop offset="1" stop-color="#DB2777"/>
    </linearGradient>
    <linearGradient id="cardPurpleL" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#A78BFA"/>
      <stop offset="1" stop-color="#7C3AED"/>
    </linearGradient>
    <linearGradient id="topFaceL" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FB923C"/>
      <stop offset="1" stop-color="#F97316"/>
    </linearGradient>
    <linearGradient id="midFaceL" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#F472B6"/>
      <stop offset="1" stop-color="#DB2777"/>
    </linearGradient>
    <linearGradient id="botFaceL" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#7C3AED"/>
      <stop offset="1" stop-color="#5B21B6"/>
    </linearGradient>
    <filter id="cardShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="14" flood-color="#000" flood-opacity="0.10"/>
    </filter>
  </defs>

  <!-- Light page background -->
  <rect width="1440" height="900" fill="#FAFAF9"/>

  <!-- Top nav bar -->
  <rect x="0" y="0" width="1440" height="64" fill="#FFFFFF" stroke="#E7E5E4" stroke-width="1"/>

  <!-- Small logo in nav -->
  <g transform="translate(40 32) scale(0.115)">
    <polygon points="0,-180 156,-90 0,0 -156,-90" fill="url(#topFaceL)"/>
    <polygon points="156,-90 156,90 0,0" fill="#EC4899"/>
    <polygon points="-156,-90 -156,90 0,0" fill="#F97316"/>
    <polygon points="-156,90 0,180 156,90 0,0" fill="url(#botFaceL)"/>
    <g stroke="#FFFFFF" stroke-width="3" fill="none">
      <polygon points="0,-180 156,-90 156,90 0,180 -156,90 -156,-90"/>
      <line x1="0" y1="-180" x2="0" y2="0"/>
      <line x1="156" y1="-90" x2="0" y2="0"/>
      <line x1="156" y1="90" x2="0" y2="0"/>
      <line x1="0" y1="180" x2="0" y2="0"/>
      <line x1="-156" y1="90" x2="0" y2="0"/>
      <line x1="-156" y1="-90" x2="0" y2="0"/>
    </g>
    <g fill="#FFFFFF">
      <circle cx="0" cy="-180" r="9"/><circle cx="156" cy="-90" r="9"/>
      <circle cx="156" cy="90" r="9"/><circle cx="0" cy="180" r="9"/>
      <circle cx="-156" cy="90" r="9"/><circle cx="-156" cy="-90" r="9"/>
      <circle cx="0" cy="0" r="11"/>
    </g>
  </g>
  <text x="88" y="40" font-family="'SF Pro Display', Helvetica, sans-serif"
        font-size="20" font-weight="700" fill="url(#wmHero)" letter-spacing="-0.5">rollout</text>
  <text x="180" y="40" font-family="'SF Mono', Menlo, monospace" font-size="12" fill="#57534E">v1.0</text>

  <!-- nav links -->
  <g font-family="'SF Pro Text', Helvetica, sans-serif" font-size="14" fill="#44403C">
    <text x="980" y="40">Docs</text>
    <text x="1040" y="40">Examples</text>
    <text x="1130" y="40">CLI</text>
    <text x="1180" y="40">Roadmap</text>
    <text x="1268" y="40">GitHub →</text>
  </g>

  <!-- Hero section -->
  <!-- Big polyhedron mark on the left -->
  <g transform="translate(290 380) scale(0.85)">
    <polygon points="0,-180 156,-90 0,0 -156,-90" fill="url(#topFaceL)"/>
    <polygon points="156,-90 156,90 0,0" fill="#EC4899"/>
    <polygon points="-156,-90 -156,90 0,0" fill="#F97316"/>
    <polygon points="-156,90 0,180 156,90 0,0" fill="url(#botFaceL)"/>
    <g fill="#FFFFFF" fill-opacity="0.07">
      <polygon points="0,-180 78,-135 0,-45"/>
      <polygon points="156,-90 78,-45 156,0"/>
      <polygon points="156,90 78,45 0,90"/>
      <polygon points="-156,90 -78,45 0,90"/>
      <polygon points="-156,-90 -78,-45 -156,0"/>
    </g>
    <g stroke="#FFFFFF" stroke-width="3" fill="none">
      <polygon points="0,-180 156,-90 156,90 0,180 -156,90 -156,-90"/>
      <line x1="0" y1="-180" x2="0" y2="0"/>
      <line x1="156" y1="-90" x2="0" y2="0"/>
      <line x1="156" y1="90" x2="0" y2="0"/>
      <line x1="0" y1="180" x2="0" y2="0"/>
      <line x1="-156" y1="90" x2="0" y2="0"/>
      <line x1="-156" y1="-90" x2="0" y2="0"/>
    </g>
    <g fill="#FFFFFF">
      <circle cx="0" cy="-180" r="9"/><circle cx="156" cy="-90" r="9"/>
      <circle cx="156" cy="90" r="9"/><circle cx="0" cy="180" r="9"/>
      <circle cx="-156" cy="90" r="9"/><circle cx="-156" cy="-90" r="9"/>
      <circle cx="0" cy="0" r="11"/>
    </g>
  </g>

  <!-- Headline -->
  <text x="560" y="290" font-family="'SF Pro Display', Helvetica, sans-serif"
        font-size="80" font-weight="800" fill="url(#wmHero)" letter-spacing="-3">rollout</text>

  <!-- Subhead -->
  <text x="560" y="350" font-family="'SF Pro Display', Helvetica, sans-serif"
        font-size="30" font-weight="500" fill="#1C1917">
    High-performance, multi-node RL for LLMs.
  </text>
  <text x="560" y="392" font-family="'SF Pro Text', Helvetica, sans-serif"
        font-size="18" fill="#57534E">
    Async-native end-to-end. Batching is a first-class trait.
  </text>
  <text x="560" y="418" font-family="'SF Pro Text', Helvetica, sans-serif"
        font-size="18" fill="#57534E">
    Written in Rust. Pluggable in Python.
  </text>

  <!-- CTA buttons -->
  <g transform="translate(560 460)">
    <rect width="180" height="48" rx="10" fill="url(#wmHero)"/>
    <text x="90" y="31" text-anchor="middle" font-family="'SF Pro Text', Helvetica, sans-serif"
          font-size="15" font-weight="600" fill="#FFFFFF">Get Started →</text>
  </g>
  <g transform="translate(760 460)">
    <rect width="180" height="48" rx="10" fill="#FFFFFF" stroke="#D6D3D1" stroke-width="1.5"/>
    <text x="90" y="31" text-anchor="middle" font-family="'SF Pro Text', Helvetica, sans-serif"
          font-size="15" font-weight="600" fill="#1C1917">⌘ View on GitHub</text>
  </g>

  <!-- Install snippet -->
  <g transform="translate(560 540)">
    <rect width="520" height="56" rx="10" fill="#1C1917"/>
    <text x="24" y="35" font-family="'SF Mono', JetBrains Mono, Menlo, monospace"
          font-size="15" fill="#A8A29E">$ </text>
    <text x="48" y="35" font-family="'SF Mono', JetBrains Mono, Menlo, monospace"
          font-size="15" fill="#FAFAF9">cargo install rollout-cli --features train</text>
  </g>

  <!-- 3 feature cards row -->
  <g transform="translate(80 696)" filter="url(#cardShadow)">
    <!-- card 1 - algorithms -->
    <g transform="translate(0 0)">
      <rect width="410" height="156" rx="14" fill="#FFFFFF" stroke="#E7E5E4"/>
      <rect width="6" height="156" rx="3" fill="url(#cardOrangeL)"/>
      <text x="28" y="44" font-family="'SF Mono', Menlo, monospace"
            font-size="11" fill="#EA580C" letter-spacing="2.5">ALGORITHMS</text>
      <text x="28" y="80" font-family="'SF Pro Display', Helvetica, sans-serif"
            font-size="22" font-weight="700" fill="#1C1917">SFT · RM · PPO · GRPO · DPO</text>
      <text x="28" y="115" font-family="'SF Pro Text', Helvetica, sans-serif"
            font-size="14" fill="#57534E">Plan-time validated. Bit-identical resume.</text>
      <text x="28" y="135" font-family="'SF Pro Text', Helvetica, sans-serif"
            font-size="14" fill="#57534E">vLLM backend + batch / online inference.</text>
    </g>
    <!-- card 2 - substrate -->
    <g transform="translate(440 0)">
      <rect width="410" height="156" rx="14" fill="#FFFFFF" stroke="#E7E5E4"/>
      <rect width="6" height="156" rx="3" fill="url(#cardMagentaL)"/>
      <text x="28" y="44" font-family="'SF Mono', Menlo, monospace"
            font-size="11" fill="#BE185D" letter-spacing="2.5">SUBSTRATE</text>
      <text x="28" y="80" font-family="'SF Pro Display', Helvetica, sans-serif"
            font-size="22" font-weight="700" fill="#1C1917">Coord + workers + plugins</text>
      <text x="28" y="115" font-family="'SF Pro Text', Helvetica, sans-serif"
            font-size="14" fill="#57534E">Async gRPC over TLS. Heartbeats + failover.</text>
      <text x="28" y="135" font-family="'SF Pro Text', Helvetica, sans-serif"
            font-size="14" fill="#57534E">PyO3 cdylib + sidecar RPC plugin host.</text>
    </g>
    <!-- card 3 - cloud -->
    <g transform="translate(880 0)">
      <rect width="410" height="156" rx="14" fill="#FFFFFF" stroke="#E7E5E4"/>
      <rect width="6" height="156" rx="3" fill="url(#cardPurpleL)"/>
      <text x="28" y="44" font-family="'SF Mono', Menlo, monospace"
            font-size="11" fill="#5B21B6" letter-spacing="2.5">STORAGE / CLOUD</text>
      <text x="28" y="80" font-family="'SF Pro Display', Helvetica, sans-serif"
            font-size="22" font-weight="700" fill="#1C1917">Embedded → Postgres → S3 / GCS</text>
      <text x="28" y="115" font-family="'SF Pro Text', Helvetica, sans-serif"
            font-size="14" fill="#57534E">AWS + GCP behind one trait. No SDK leak.</text>
      <text x="28" y="135" font-family="'SF Pro Text', Helvetica, sans-serif"
            font-size="14" fill="#57534E">Snapshots: process (CRIU) + episodic.</text>
    </g>
  </g>
</svg>
