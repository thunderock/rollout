[graph]
all-features = true
no-default-features = false

[advisories]
version = 2
yanked = "deny"
unmaintained = "workspace"

[licenses]
version = 2
allow = [
    "Apache-2.0",
    "MIT",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-DFS-2016",
    "Unicode-3.0",
    "CC0-1.0",
    "Zlib",
    "0BSD",
    "MPL-2.0",
    "CDLA-Permissive-2.0",
]
confidence-threshold = 0.93
private = { ignore = true }

[bans]
multiple-versions = "warn"
wildcards = "deny"
allow-wildcard-paths = true
deny = [
    { name = "openssl",     reason = "use rustls when TLS arrives in later phases" },
    { name = "openssl-sys", reason = "see openssl above" },
]

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-git = []
