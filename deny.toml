[graph]
all-features = true
no-default-features = false

[advisories]
version = 2
yanked = "deny"
unmaintained = "workspace"
# RUSTSEC-2025-0111 / CVE-2025-62518 / GHSA-j5gw-2vrg-8fgx — `tokio-tar 0.3.1` is
# unmaintained + unsound (PAX header smuggling). Reaches this workspace only via
# `testcontainers 0.23` (dev-dependency of `rollout-storage`, gated behind
# `--features postgres` and the `#[ignore]`d testcontainers suite). No safe
# upgrade is available (announcement: https://edera.dev/stories/tarmageddon).
# Tracked in `.planning/v1.0-MILESTONE-AUDIT.md` tech_debt; revisit when
# `testcontainers` adopts `astral-tokio-tar` or when we switch to a dockerless
# integration harness.
ignore = ["RUSTSEC-2025-0111"]

[licenses]
version = 2
allow = [
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "MIT",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-DFS-2016",
    "Unicode-3.0",
    "CC0-1.0",
    "Zlib",
    "0BSD",
    "MPL-2.0",
    "CDLA-Permissive-2.0",
]
confidence-threshold = 0.93
private = { ignore = true }

[bans]
multiple-versions = "warn"
wildcards = "deny"
allow-wildcard-paths = true
deny = [
    { name = "openssl",     reason = "use rustls when TLS arrives in later phases" },
    { name = "openssl-sys", reason = "see openssl above" },
]

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-git = []
