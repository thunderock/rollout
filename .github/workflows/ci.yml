name: ci

on:
  pull_request:
  push:
    branches: [main]

# docs-deploy needs these to publish GitHub Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent Pages deploy per ref.
concurrency:
  group: "pages-${{ github.ref }}"
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: short

jobs:
  lint:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.88.0
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: ci-lint
      - run: cargo fmt --all -- --check
      # Default features only. The experimental `quic` feature in `rollout-transport`
      # pulls h3-quinn 0.0.7 which is API-incompatible with quinn 0.11.x — see
      # docs/book/src/substrate/transport.md and Phase 2 RESEARCH §"Pitfall 2".
      # Revisit when h3-quinn / tonic-h3 stabilize (post-Phase 6).
      - run: cargo clippy --workspace --all-targets -- -D warnings

  test:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.88.0
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: ci-test
      - run: cargo test --workspace --tests

  deny:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.88.0
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check advisories licenses bans sources

  commitlint:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Install convco (macOS)
        run: |
          set -euo pipefail
          curl -sSL https://github.com/convco/convco/releases/latest/download/convco-macos.zip -o /tmp/convco.zip
          unzip -o /tmp/convco.zip -d /tmp/convco
          chmod +x /tmp/convco/convco
          sudo mv /tmp/convco/convco /usr/local/bin/
      - name: Lint commits
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            convco check ${{ github.event.pull_request.base.sha }}..HEAD
          else
            # Tolerant on direct main pushes during bootstrap (D-CI-04).
            convco check HEAD~10..HEAD || true
          fi

  schema-drift:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.88.0
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: ci-schema-drift
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install Python tools
        run: pip install datamodel-code-generator==0.57.0 check-jsonschema==0.37.2
      - name: Regenerate schemas
        run: cargo xtask schema-gen
      - name: Assert no drift
        run: |
          set -e
          git diff --exit-code schemas/ python/ \
            || (echo "::error::Schema drift detected. Run 'cargo xtask schema-gen' and commit."; exit 1)
      - name: Validate generated schema (meta-schema)
        run: check-jsonschema --check-metaschema schemas/rollout.schema.json

  architecture-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.88.0
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: ci-arch-lint
      - name: Dependency-direction lint
        run: cargo test -p rollout-core --test dependency_direction

  unused-deps:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: bnjbvr/cargo-machete@v0.9.2

  rustdoc-check:
    runs-on: ubuntu-latest
    env:
      RUSTDOCFLAGS: "-D warnings -D rustdoc::broken_intra_doc_links -D rustdoc::missing_crate_level_docs"
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.88.0
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: ci-rustdoc
      - name: Build workspace rustdoc with deny flags
        # Default features only. The experimental `quic` feature in `rollout-transport`
        # pulls h3-quinn 0.0.7 which is API-incompatible with quinn 0.11.x — see
        # docs/book/src/substrate/transport.md and Phase 2 RESEARCH §"Pitfall 2".
        # Revisit when h3-quinn / tonic-h3 stabilize (post-Phase 6).
        run: cargo doc --workspace --no-deps

  docs-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.88.0
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: ci-docs-build
      - uses: peaceiris/actions-mdbook@v2
        with:
          mdbook-version: '0.4.40'
      - name: Build mdBook
        run: mdbook build docs/book
      - name: Configure Pages
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/configure-pages@v5
        with:
          # Auto-enable Pages on first push when the repo hasn't been opted in yet
          # (the `Get Pages site` API returns 404 otherwise, failing the step).
          # Requires `pages: write` workflow permission (set at workflow level).
          # Tracked in `.planning/v1.0-MILESTONE-AUDIT.md` Phase-02 tech_debt.
          enablement: true
      - name: Upload Pages artifact
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/book/book

  docs-deploy:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [docs-build, test, lint]
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  docs-test-policy:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Run docs+tests touched check
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: bash scripts/check-docs-tests-touched.sh

  smoke:
    # SUBSTR-02 / SUBSTR-03 / SUBSTR-04 acceptance gate. Runs the end-to-end
    # 1-coordinator + 2-workers + 1-cdylib + 1-Python-sidecar test from
    # CONTEXT D-COORD-02. The architecture-lint invariant added by plan 02-07
    # (rollout-coordinator ↛ rollout-plugin-host / rollout-cloud-*) is
    # enforced by the existing architecture-lint job via the dep-direction
    # test — no new YAML wiring needed for that.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.88.0
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: ci-smoke
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install netcat (for smoke.sh port poll)
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends netcat-openbsd
      - name: Preflight
        run: bash scripts/preflight.sh
      - name: Run smoke test
        run: make smoke
      - name: Upload smoke logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-logs
          path: data/smoke/logs/
          if-no-files-found: ignore

  postgres-integration:
    # TRAIN-04 acceptance gate. testcontainers Postgres 16 on ubuntu-latest;
    # default-fires on every PR. The integration tests carry
    # `#[ignore = "requires Docker / testcontainers"]` so `cargo test
    # --workspace --tests` keeps a Docker-free macOS dev loop green; this
    # job opts into them via `-- --include-ignored`.
    runs-on: ubuntu-latest
    needs: test
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.88.0
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: ci-postgres-integration
      - name: Offline-mode compile check
        env:
          SQLX_OFFLINE: "true"
        run: cargo check -p rollout-storage --features postgres
      - name: Run testcontainers Postgres integration tests
        env:
          SQLX_OFFLINE: "true"
          RUST_LOG: rollout_storage=info,sqlx=warn
        run: cargo test -p rollout-storage --features postgres --test postgres_integration -- --include-ignored --test-threads=1
      - name: Run scan_bytes parity proptest (PITFALLS.md §17)
        env:
          SQLX_OFFLINE: "true"
          RUST_LOG: rollout_storage=info,sqlx=warn
        run: cargo test -p rollout-storage --features postgres --test postgres_scan_bytes_parity -- --include-ignored --test-threads=1

  infer-smoke:
    # BACKEND-02 live acceptance gate. Opt-in: only fires when
    # ROLLOUT_VLLM_AVAILABLE=1 is set on the workflow run (manual dispatch,
    # self-hosted runner, or repo-level env override). Default public-runner CI
    # leaves this job out of the required set so a missing vLLM install does
    # not block PRs. The deterministic restart-no-duplicates proof
    # (BACKEND-02 exit criterion b) runs in the standard `test` job via
    # MockBackend — no GPU/vLLM required there. This job covers exit criterion
    # (a): `rollout infer batch --config examples/batch-tiny.toml` on a real
    # model. See docs/book/src/inference/cli.md.
    runs-on: ubuntu-latest
    if: ${{ vars.ROLLOUT_VLLM_AVAILABLE == '1' }}
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.88.0
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: ci-infer-smoke
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install vLLM
        run: pip install 'vllm>=0.10,<0.22'
      - name: Run infer-smoke
        env:
          ROLLOUT_VLLM_AVAILABLE: "1"
        run: make infer-smoke

  train-smoke:
    # Phase-4 SFT live acceptance gate. Opt-in: only fires when
    # ROLLOUT_TRANSFORMERS_AVAILABLE=1 is set on the workflow run (manual
    # dispatch, self-hosted runner, or repo-level env override). Default
    # public-runner CI leaves this out of the required set so a missing
    # transformers/torch install does not block PRs. The deterministic
    # bit-identical-resume proof (TRAIN-03) runs in the standard `test` job via
    # MockBackend — no transformers required there. This job covers the
    # ROADMAP Phase-4 exit criterion "rollout train sft --config
    # examples/sft-tiny.toml completes on a 1B model" using
    # Qwen/Qwen2.5-0.5B-Instruct on CPU.
    runs-on: ubuntu-latest
    if: ${{ vars.ROLLOUT_TRANSFORMERS_AVAILABLE == '1' }}
    needs: test
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.88.0
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: ci-train-smoke
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install transformers + accelerate + torch (CPU)
        run: pip install 'transformers>=4.45,<5.0' 'accelerate>=1.0,<2.0' 'torch>=2.1,<3.0' --extra-index-url https://download.pytorch.org/whl/cpu
      - name: Run train-smoke
        env:
          ROLLOUT_TRANSFORMERS_AVAILABLE: "1"
        run: make train-smoke
